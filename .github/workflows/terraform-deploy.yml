name: Terraform Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-deploy.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-deploy.yml'
  workflow_dispatch:

env:
  TERRAFORM_VERSION: '1.9'
  TAILSCALE_VERSION: '1.76.6'

jobs:
  # Plan job runs on all triggers (PR, push, manual)
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh -o /tmp/install.sh
          sh /tmp/install.sh
          tailscale version

      - name: Connect to Tailscale
        run: |
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname "github-actions-terraform" --accept-routes
          sudo tailscale status

      - name: Terraform Init
        working-directory: ./terraform
        env:
          N8N_API_URL: ${{ vars.N8N_API_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform init \
            -backend-config="endpoints={s3=\"${{ vars.S3_ENDPOINT }}\"}" \
            -backend-config="access_key=${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -backend-config="secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="use_path_style=true"

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ./terraform
        env:
          TF_VAR_n8n_api_url: ${{ vars.N8N_API_URL }}
          TF_VAR_n8n_api_key: ${{ secrets.N8N_API_KEY }}
          TF_VAR_zai_glm_api_key: ${{ secrets.ZAI_GLM_API_KEY }}
          TF_VAR_home_assistant_token: ${{ secrets.HOME_ASSISTANT_TOKEN }}
        run: |
          terraform plan -out=tfplan -no-color 2>&1 | tee plan.txt
          exitcode=$?
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
          exit $exitcode

      - name: Upload Plan Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan
          retention-days: 7

      - name: Disconnect Tailscale
        if: always()
        run: sudo tailscale down

  # Apply job only runs on push to main and requires manual approval
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh -o /tmp/install.sh
          sh /tmp/install.sh
          tailscale version

      - name: Connect to Tailscale
        run: |
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname "github-actions-terraform" --accept-routes
          sudo tailscale status

      - name: Terraform Init
        working-directory: ./terraform
        env:
          N8N_API_URL: ${{ vars.N8N_API_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform init \
            -backend-config="endpoints={s3=\"${{ vars.S3_ENDPOINT }}\"}" \
            -backend-config="access_key=${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -backend-config="secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="use_path_style=true"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: terraform/

      - name: Terraform Apply
        working-directory: ./terraform
        env:
          TF_VAR_n8n_api_url: ${{ vars.N8N_API_URL }}
          TF_VAR_n8n_api_key: ${{ secrets.N8N_API_KEY }}
          TF_VAR_zai_glm_api_key: ${{ secrets.ZAI_GLM_API_KEY }}
          TF_VAR_home_assistant_token: ${{ secrets.HOME_ASSISTANT_TOKEN }}
        run: terraform apply -auto-approve tfplan

      - name: Disconnect Tailscale
        if: always()
        run: sudo tailscale down
